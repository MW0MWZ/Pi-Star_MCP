[dashboard]
listen_http  = :8080
listen_https = :8443

[tls]
cert_file     = /etc/pistar-dashboard/certs/server.crt
key_file      = /etc/pistar-dashboard/certs/server.key
auto_generate = 1
min_version   = 1.2

[services]
mmdvmhost_enabled=1
dmrgateway_enabled=1
ysfgateway_enabled=1
p25gateway_enabled=1
nxdngateway_enabled=1
dstargateway_enabled=0

fmgateway_enabled=0
aprsgateway_enabled=0
dapnetgateway_enabled=0
dmr2ysf_enabled=1
dmr2nxdn_enabled=0
ysf2dmr_enabled=0
ysf2nxdn_enabled=0
ysf2p25_enabled=0
nxdn2dmr_enabled=0
ysfparrot_enabled=0
p25parrot_enabled=0
nxdnparrot_enabled=0
dstarrepeater_enabled=0
dstarrepeater_hwtype=icom
dgidgateway_enabled=0

