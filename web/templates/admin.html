<!DOCTYPE html>
<html lang="en" data-theme="default-light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="admin.title">Pi-Star Admin</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    <!-- Theme CSS — all loaded, active one selected via data-theme attribute -->
    <link rel="stylesheet" href="/modules/core/themes/default-light.css">
    <link rel="stylesheet" href="/modules/core/themes/default-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/classic-light.css">
    <link rel="stylesheet" href="/modules/core/themes/classic-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/emerald-light.css">
    <link rel="stylesheet" href="/modules/core/themes/emerald-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/high-contrast-light.css">
    <link rel="stylesheet" href="/modules/core/themes/high-contrast-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/ocean-light.css">
    <link rel="stylesheet" href="/modules/core/themes/ocean-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/sunset-light.css">
    <link rel="stylesheet" href="/modules/core/themes/sunset-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/slate-light.css">
    <link rel="stylesheet" href="/modules/core/themes/slate-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/night-ops-dark.css">
    <link rel="stylesheet" href="/modules/core/themes/midnight-dark.css">
    <script>
        // Apply saved theme before paint to avoid flash
        (function() {
            var theme;
            try { theme = localStorage.getItem('pistar-theme'); } catch (e) {}
            document.documentElement.setAttribute('data-theme', theme || 'default-light');
        })();
    </script>
</head>
<body>
    <header role="banner">
        <nav role="navigation" aria-label="Main navigation">
            <a href="/" class="nav-brand" data-i18n="nav.title">Pi-Star</a>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu">
                <span class="nav-toggle-icon"></span>
            </button>
            <ul id="nav-menu" role="menubar">
                <li role="none"><a role="menuitem" href="/" data-i18n="nav.dashboard">Dashboard</a></li>
                <li role="none"><a role="menuitem" href="/admin" aria-current="page" data-i18n="nav.admin">Admin</a></li>
            </ul>
            <div class="nav-actions">
                <select id="theme-picker" aria-label="Theme">
                    <optgroup label="Default">
                        <option value="default-light">Default Light</option>
                        <option value="default-dark">Default Dark</option>
                    </optgroup>
                    <optgroup label="Classic">
                        <option value="classic-light">Classic Light</option>
                        <option value="classic-dark">Classic Dark</option>
                    </optgroup>
                    <optgroup label="Ocean">
                        <option value="ocean-light">Ocean Light</option>
                        <option value="ocean-dark">Ocean Dark</option>
                    </optgroup>
                    <optgroup label="Sunset">
                        <option value="sunset-light">Sunset Light</option>
                        <option value="sunset-dark">Sunset Dark</option>
                    </optgroup>
                    <optgroup label="Emerald">
                        <option value="emerald-light">Emerald Light</option>
                        <option value="emerald-dark">Emerald Dark</option>
                    </optgroup>
                    <optgroup label="Slate">
                        <option value="slate-light">Slate Light</option>
                        <option value="slate-dark">Slate Dark</option>
                    </optgroup>
                    <optgroup label="High Contrast">
                        <option value="high-contrast-light">High Contrast Light</option>
                        <option value="high-contrast-dark">High Contrast Dark</option>
                    </optgroup>
                    <optgroup label="Dark">
                        <option value="night-ops-dark">Night Ops</option>
                        <option value="midnight-dark">Midnight</option>
                    </optgroup>
                </select>
                <form method="post" action="/logout" class="nav-logout-form">
                    <button type="submit" class="nav-logout-btn" aria-label="Log Out" title="Log Out">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </form>
            </div>
        </nav>
    </header>

    <div class="admin-layout">
        <aside class="admin-sidebar" role="navigation" aria-label="Admin navigation">
            <ul>
                <li><a href="#radio" class="sidebar-link active" data-i18n="admin.nav.radio">Radio</a></li>
                <li><a href="#configuration" class="sidebar-link" data-i18n="admin.nav.configuration">Configuration</a></li>
            </ul>
        </aside>

        <main role="main" id="admin-content">
            <section id="page-radio" class="admin-page">
                <h1 data-i18n="radio.title">Radio Configuration</h1>
                <div id="radio-content" class="radio-settings-panel card">
                    <p class="loading" data-i18n="radio.loading">Loading radio settings...</p>
                </div>
            </section>

            <section id="page-configuration" class="admin-page" style="display: none;">
                <h1 data-i18n="admin.config.title">Service Configuration</h1>
                <div class="config-layout">
                    <div class="service-list-panel card">
                        <h2 data-i18n="admin.config.services">Services</h2>
                        <div id="service-list" aria-label="Service list">
                            <p class="loading" data-i18n="admin.config.loading">Loading services...</p>
                        </div>
                    </div>
                    <div class="settings-panel card">
                        <div id="settings-content">
                            <p class="placeholder-text" data-i18n="admin.config.selectService">Select a service to view its settings</p>
                        </div>
                    </div>
                </div>
            </section>

            <div aria-live="polite" id="admin-status" class="sr-only"></div>
        </main>
    </div>

    <footer role="contentinfo">
        <p>Pi-Star v5</p>
    </footer>

    <script src="/static/js/pistar.js"></script>
    <script src="/static/js/validate.js"></script>
    <script src="/static/js/radio.js"></script>
    <script src="/static/js/configurator.js"></script>
</body>
</html>
